<div class="grid grid-cols-12 gap-5 p-5">
  <div class="col-span-2 bg-white p-5 rounded-lg">
    <h3 class="text-lg font-semibold mb-4">Field Types</h3>
    <div
      id="toolboxList"
      cdkDropList
      [cdkDropListConnectedTo]="['formList']"
      [cdkDropListData]="formBuilderService.fieldTypes"
      class="flex flex-col gap-2"
    >
      @for (fieldType of fieldTypes; track $index) {
        <div cdkDrag class="bg-blue-500 text-white px-4 py-2 rounded cursor-pointer">
          {{ fieldType.label }}
        </div>
      }
    </div>
  </div>
  <div class="col-span-7 bg-white p-5 rounded-lg">
    <h3 class="text-lg font-semibold mb-4">Designer</h3>
    <form
      id="formList"
      cdkDropList
      [cdkDropListConnectedTo]="['toolboxList']"
      [cdkDropListData]="formBuilderService.config"
      (cdkDropListDropped)="addField($event)"
      [formGroup]="form"
      (submit)="submitForm()"
    >
      @for (field of formBuilderService.config; track $index) {
        <!-- <app-text-input [inputDefinition]="field"></app-text-input> -->
        <div class="">
          <div class="flex justify-between items-center mb-1">
            <label for="{{ field.key }}" class="block text-sm/normal font-semibold text-gray-900">{{
              field.label
            }}</label>
            <button (click)="removeField(field.key)" matIconButton aria-label="Delete Field">
              <mat-icon>close</mat-icon>
            </button>
          </div>
          <mat-form-field appearance="outline" class="w-full transform scale-100 origin-top-left">
            <input matInput [formControlName]="field.key" [placeholder]="field.placeholder ?? ''" />
            <mat-hint>{{ field.hint }}</mat-hint>
          </mat-form-field>
        </div>
      }

      <!-- Drop Zone Card -->
      <div
        id="dropZone"
        class="drop-zone bg-white rounded-xl shadow-lg p-8 border-2 border-dashed border-gray-300 transition-all duration-200 hover:border-gray-400"
      >
        <div class="text-center">
          <svg
            class="mx-auto h-12 w-12 text-gray-400 mb-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"
            ></path>
          </svg>
          <h3 class="text-lg font-semibold text-gray-700 mb-2">Drop items here</h3>
          <p class="text-sm text-gray-500">Drag and drop items to this zone</p>
        </div>
      </div>
      <!-- <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Submit</button> -->
    </form>
  </div>
  <div class="col-span-3 bg-white p-5 rounded-lg">
    <app-field-properties></app-field-properties>
  </div>
</div>
